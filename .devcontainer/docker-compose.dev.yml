version: '3.8'

services:
  scraper:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    container_name: showscraper-dev
    environment:
      - HEADLESS=true
      - NO_DB=true
      - NO_GCS=${NO_GCS:-false}
      - STORAGE_PROJECT=${STORAGE_PROJECT}
      - GCS_BUCKET=${GCS_BUCKET}
      - GCS_TEST_BUCKET=${GCS_TEST_BUCKET}
      - STORAGE_CREDENTIALS_JSON=${STORAGE_CREDENTIALS_JSON}
      - PRINT_EVENTS=true
      - PRINT_FULL_DETAIL=false
      - RESCUE_SCRAPING_ERRORS=true
      - LOG_PATH=/app/logs/scraper.log
      - CODESPACES=${CODESPACES:-false}
    volumes:
      # Mount entire workspace for development
      - ..:/app:cached
      # Mount credentials directory
      - ${CREDENTIALS_PATH:-../credentials}:/app/credentials:ro
      # Mount logs directory
      - ${LOGS_PATH:-../logs}:/app/logs
    command: sleep infinity
